services:
  backend:
    image: ${ECR_REGISTRY}/mediqlabs-backend:${BACKEND_TAG:-latest}
    restart: unless-stopped
    expose:
      - "5002"
    environment:
      PORT: 5002
      NODE_ENV: production
      DB_URI: ${DB_URI}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME}
      OTP_EXPIRY_SECONDS: ${OTP_EXPIRY_SECONDS}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS}
      OTP_MAX_RESENDS: ${OTP_MAX_RESENDS}
      OTP_LENGTH: ${OTP_LENGTH}
      USE_MSG91_OTP: ${USE_MSG91_OTP}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY}
      MSG91_TEMPLATE_LOGIN_OTP: ${MSG91_TEMPLATE_LOGIN_OTP}
      MSG91_TEMPLATE_SIGNUP_OTP: ${MSG91_TEMPLATE_SIGNUP_OTP}
      MSG91_TEMPLATE_PASSWORD_RESET: ${MSG91_TEMPLATE_PASSWORD_RESET}
      MSG91_TEMPLATE_RIDER_ASSIGNED_RIDER: ${MSG91_TEMPLATE_RIDER_ASSIGNED_RIDER}
      MSG91_TEMPLATE_RIDER_ASSIGNED_CLIENT: ${MSG91_TEMPLATE_RIDER_ASSIGNED_CLIENT}
      MSG91_TEMPLATE_REPORT_READY: ${MSG91_TEMPLATE_REPORT_READY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      APPLE_CALLBACK_URL: ${APPLE_CALLBACK_URL}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      OTP_PROVIDER: ${OTP_PROVIDER}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

  client-frontend:
    image: ${ECR_REGISTRY}/mediqlabs-client-frontend:${CLIENT_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  admin-frontend:
    image: ${ECR_REGISTRY}/mediqlabs-admin-frontend:${ADMIN_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - client-frontend
      - admin-frontend
    networks:
      - internal

networks:
  internal:
    driver: bridge
